steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend-image'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        docker build \
          --build-arg VITE_API_URL="${_API_URL}" \
          --build-arg VITE_WS_URL="${_WS_URL}" \
          --build-arg VITE_SUPABASE_URL="${_SUPABASE_URL}" \
          --build-arg VITE_SUPABASE_ANON_KEY="${_SUPABASE_ANON_KEY}" \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/petal-frontend:${BUILD_ID}" \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/petal-frontend:latest" \
          .
    dir: 'frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-frontend'
    waitFor: ['build-frontend-image']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'petal-frontend'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-frontend:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=80'
    waitFor: ['push-frontend-image']

substitutions:
  _REGION: us-central1
  _REPO: petal-repo
  _API_URL: https://petal-ycmhorzhoa-uc.a.run.app/api/v1
  _WS_URL: wss://petal-ycmhorzhoa-uc.a.run.app/api/v1
  _SUPABASE_URL: https://uyaufdgftetpctpgnbvl.supabase.co
  _SUPABASE_ANON_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
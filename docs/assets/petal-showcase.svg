<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Petal Showcase</title>
  <desc id="desc">Three-panel product showcase showing landing, sign in, and app screens in a brutalist style</desc>
  <rect width="1600" height="900" fill="#fff8f5"/>
  <g transform="translate(60 64)">
    <rect x="0" y="0" width="1460" height="772" rx="24" fill="#f5ede8" stroke="#1a0a0d" stroke-width="6"/>
    <line x1="486.7" y1="0" x2="486.7" y2="772" stroke="#1a0a0d" stroke-width="6"/>
    <line x1="973.3" y1="0" x2="973.3" y2="772" stroke="#1a0a0d" stroke-width="6"/>

    <!-- Landing -->
    <rect x="0" y="0" width="486.7" height="772" fill="#ffcdb2"/>
    <text x="34" y="78" font-family="Bebas Neue, Impact, sans-serif" font-size="46" fill="#1a0a0d" letter-spacing="2">PETAL</text>
    <text x="36" y="120" font-family="Space Mono, monospace" font-size="12" fill="#6d6875" letter-spacing="3">MULTI-AGENT PRODUCTIVITY SYSTEM</text>
    <text x="36" y="206" font-family="Bebas Neue, Impact, sans-serif" font-size="72" fill="#1a0a0d" letter-spacing="2">RUN YOUR DAY</text>
    <text x="36" y="272" font-family="Bebas Neue, Impact, sans-serif" font-size="72" fill="#1a0a0d" letter-spacing="2">WITH AGENTS</text>
    <rect x="36" y="332" width="150" height="48" fill="#6d6875" stroke="#1a0a0d" stroke-width="4"/>
    <text x="71" y="363" font-family="Space Mono, monospace" font-size="14" fill="#ffcdb2" font-weight="700">START FREE</text>
    <rect x="200" y="332" width="180" height="48" fill="#ffcdb2" stroke="#1a0a0d" stroke-width="4"/>
    <text x="229" y="363" font-family="Space Mono, monospace" font-size="14" fill="#1a0a0d" font-weight="700">HOW IT WORKS</text>
    <rect x="36" y="446" width="396" height="198" fill="#fff8f5" stroke="#1a0a0d" stroke-width="4"/>
    <circle cx="92" cy="520" r="42" fill="#e5989b" stroke="#1a0a0d" stroke-width="5"/>
    <rect x="140" y="478" width="120" height="84" fill="#6d6875" stroke="#1a0a0d" stroke-width="5"/>
    <rect x="286" y="492" width="96" height="96" fill="#b5838d" stroke="#1a0a0d" stroke-width="5"/>

    <!-- Sign in -->
    <rect x="486.7" y="0" width="486.6" height="772" fill="#ffb4a2"/>
    <rect x="570" y="154" width="320" height="386" fill="#fff8f5" stroke="#1a0a0d" stroke-width="6"/>
    <rect x="570" y="154" width="320" height="84" fill="#6d6875" stroke="#1a0a0d" stroke-width="6"/>
    <text x="596" y="210" font-family="Bebas Neue, Impact, sans-serif" font-size="54" fill="#ffcdb2">SIGN IN</text>
    <text x="596" y="248" font-family="Space Mono, monospace" font-size="11" fill="#6d6875">Use your account to open the workspace.</text>
    <rect x="596" y="278" width="268" height="36" fill="none" stroke="#1a0a0d" stroke-width="4"/>
    <rect x="596" y="340" width="268" height="36" fill="none" stroke="#1a0a0d" stroke-width="4"/>
    <rect x="596" y="404" width="268" height="40" fill="#6d6875" stroke="#1a0a0d" stroke-width="4"/>
    <rect x="596" y="462" width="268" height="34" fill="#ffcdb2" stroke="#1a0a0d" stroke-width="4"/>
    <rect x="596" y="508" width="268" height="34" fill="#f5ede8" stroke="#1a0a0d" stroke-width="4"/>
    <text x="628" y="302" font-family="Space Mono, monospace" font-size="11" fill="#b5838d">EMAIL</text>
    <text x="628" y="364" font-family="Space Mono, monospace" font-size="11" fill="#b5838d">PASSWORD</text>

    <!-- App -->
    <rect x="973.3" y="0" width="486.7" height="772" fill="#fff8f5"/>
    <rect x="973.3" y="0" width="486.7" height="52" fill="#1a0a0d"/>
    <rect x="973.3" y="52" width="486.7" height="92" fill="#ffcdb2" stroke="#1a0a0d" stroke-width="6"/>
    <rect x="973.3" y="144" width="168" height="628" fill="#ffcdb2" stroke="#1a0a0d" stroke-width="6"/>
    <rect x="1141.3" y="144" width="318.7" height="628" fill="#fff8f5" stroke="#1a0a0d" stroke-width="6"/>
    <text x="1002" y="86" font-family="Bebas Neue, Impact, sans-serif" font-size="40" fill="#1a0a0d">AGENT CONSOLE</text>
    <rect x="1158" y="206" width="280" height="60" fill="#ffcdb2" stroke="#1a0a0d" stroke-width="4" rx="8"/>
    <text x="1178" y="242" font-family="Space Mono, monospace" font-size="13" fill="#1a0a0d">Welcome to PETAL. Ask anything.</text>
    <rect x="996" y="174" width="122" height="24" fill="#6d6875" stroke="#1a0a0d" stroke-width="3"/>
    <text x="1016" y="191" font-family="Space Mono, monospace" font-size="10" fill="#ffcdb2">TASKS</text>
    <rect x="996" y="212" width="122" height="24" fill="#f5ede8" stroke="#1a0a0d" stroke-width="3"/>
    <text x="1016" y="229" font-family="Space Mono, monospace" font-size="10" fill="#1a0a0d">CALENDAR</text>
    <rect x="996" y="250" width="122" height="24" fill="#f5ede8" stroke="#1a0a0d" stroke-width="3"/>
    <text x="1016" y="267" font-family="Space Mono, monospace" font-size="10" fill="#1a0a0d">NOTES</text>
  </g>
</svg>

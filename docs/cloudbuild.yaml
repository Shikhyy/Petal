steps:
  # ── Step 1: Install & Test ──────────────────────────────────────────────
  - name: 'python:3.12'
    id: 'install-deps'
    entrypoint: pip
    args: ['install', '-r', 'requirements.txt', '--quiet']

  - name: 'python:3.12'
    id: 'run-tests'
    entrypoint: pytest
    args: ['backend/tests/', '-v', '--tb=short', '-q']
    waitFor: ['install-deps']
    env:
      - 'TESTING=true'
      - 'GCP_PROJECT=$PROJECT_ID'

  # ── Step 2: Build & Push Image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-api:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-api:latest'
      - '.'
    waitFor: ['run-tests']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-api'
    waitFor: ['build-image']

  # ── Step 3: Deploy Backend to Cloud Run ────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'petal-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/petal-api:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--port=8080'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_REGION=${_REGION},GEMINI_MODEL=gemini-2.0-flash'
      - '--set-secrets=SECRET_KEY=petal-secret-key:latest'
      - '--service-account=petal-sa@$PROJECT_ID.iam.gserviceaccount.com'
    waitFor: ['push-image']

  # ── Step 4: Build & Deploy Frontend ────────────────────────────────────
  - name: 'node:20'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm ci --quiet
        echo "VITE_API_URL=$(gcloud run services describe petal-api --region=${_REGION} --format='value(status.url)')/api/v1" > .env.production
        npm run build
    waitFor: ['deploy-backend']

  - name: 'node:20'
    id: 'deploy-frontend'
    dir: 'frontend'
    entrypoint: bash
    args:
      - '-c'
      - 'npx firebase-tools@latest deploy --only hosting --token $$FIREBASE_TOKEN --project $PROJECT_ID'
    secretEnv: ['FIREBASE_TOKEN']
    waitFor: ['build-frontend']

substitutions:
  _REGION: us-central1
  _REPO: petal-repo

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-deploy-token/versions/latest
      env: 'FIREBASE_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
